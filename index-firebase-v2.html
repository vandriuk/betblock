<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облік виробництва шлакоблоків v2</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- XLSX для експорту в Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // ========== НАЛАШТУВАННЯ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBal2IiMwq97gBRfODesYVtRDHmBfQTWsY",
            authDomain: "shlakoblock-ebf35.firebaseapp.com",
            projectId: "shlakoblock-ebf35",
            storageBucket: "shlakoblock-ebf35.firebasestorage.app",
            messagingSenderId: "198560932701",
            appId: "1:198560932701:web:5f1b278f4be868cb087eb4"
        };
        
        const isFirebaseConfigured = !firebaseConfig.apiKey.includes("ВАШ");
        let app, auth, db;
        let DEMO_MODE = !isFirebaseConfigured;
        
        if (isFirebaseConfigured) {
            try {
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                console.log("✓ Firebase підключено");
            } catch (error) {
                console.error("❌ Помилка Firebase:", error);
                DEMO_MODE = true;
            }
        } else {
            console.log("🎮 ДЕМО-РЕЖИМ");
        }
        
        // Іконки
        const Plus = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );
        
        const Trash2 = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );
        
        const Edit = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        );
        
        const Package = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line>
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
        );
        
        const Factory = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path>
                <path d="M17 18h1"></path>
                <path d="M12 18h1"></path>
                <path d="M7 18h1"></path>
            </svg>
        );
        
        const ShoppingCart = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
        );
        
        const ClipboardList = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                <path d="M12 11h4"></path>
                <path d="M12 16h4"></path>
                <path d="M8 11h.01"></path>
                <path d="M8 16h.01"></path>
            </svg>
        );
        
        const DollarSign = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="12" y1="1" x2="12" y2="23"></line>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
        );
        
        const BarChart3 = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M3 3v18h18"></path>
                <path d="M18 17V9"></path>
                <path d="M13 17V5"></path>
                <path d="M8 17v-3"></path>
            </svg>
        );
        
        const Download = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );
        
        const Database = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </svg>
        );
        
        const AlertCircle = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );
        
        const LogOut = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        );

        // Компонент авторизації
        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                if (DEMO_MODE) {
                    const demoUsers = {
                        'admin@example.com': { password: 'admin123', role: 'admin' },
                        'manager@example.com': { password: 'manager123', role: 'manager' },
                        'worker@example.com': { password: 'worker123', role: 'worker' }
                    };
                    
                    if (demoUsers[email] && demoUsers[email].password === password) {
                        localStorage.setItem('currentUser', JSON.stringify({
                            email: email,
                            role: demoUsers[email].role,
                            uid: email.split('@')[0]
                        }));
                        window.location.reload();
                    } else {
                        setError('Невірний email або пароль');
                    }
                } else {
                    try {
                        await auth.signInWithEmailAndPassword(email, password);
                    } catch (error) {
                        setError('Невірний email або пароль');
                    }
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center p-4">
                    <div className="bg-white rounded-lg shadow-2xl p-8 max-w-md w-full">
                        {DEMO_MODE && (
                            <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                                <p className="text-yellow-800 font-medium text-sm">🎮 ДЕМО-РЕЖИМ</p>
                                <p className="text-yellow-700 text-xs mt-1">
                                    Налаштуйте Firebase для хмарної синхронізації
                                </p>
                            </div>
                        )}
                        
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold text-gray-900 mb-2">Облік виробництва v2</h1>
                            <p className="text-gray-600">Увійдіть до системи</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="admin@example.com"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Пароль</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="admin123"
                                    required
                                />
                            </div>

                            {error && (
                                <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">
                                    {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50"
                            >
                                {loading ? 'Вхід...' : 'Увійти'}
                            </button>
                        </form>

                        <div className="mt-6 text-center text-sm text-gray-600">
                            <p>Тестові акаунти:</p>
                            <p className="mt-2">admin@example.com / admin123</p>
                        </div>
                    </div>
                </div>
            );
        };

        const ProductionApp = () => {
            const [user, setUser] = useState(null);
            const [userRole, setUserRole] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [inventory, setInventory] = useState([]);
            const [products, setProducts] = useState([]);
            const [production, setProduction] = useState([]);
            const [orders, setOrders] = useState([]);
            const [sales, setSales] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);

            // Авторизація
            useEffect(() => {
                if (DEMO_MODE) {
                    const currentUser = localStorage.getItem('currentUser');
                    if (currentUser) {
                        const userData = JSON.parse(currentUser);
                        setUser(userData);
                        setUserRole(userData.role);
                    }
                    setLoading(false);
                } else {
                    const unsubscribe = auth.onAuthStateChanged(async (user) => {
                        if (user) {
                            setUser(user);
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) {
                                setUserRole(userDoc.data().role);
                            }
                        } else {
                            setUser(null);
                            setUserRole(null);
                        }
                        setLoading(false);
                    });
                    return () => unsubscribe();
                }
            }, []);

            // Завантаження даних
            useEffect(() => {
                if (!user) return;

                if (DEMO_MODE) {
                    const invData = JSON.parse(localStorage.getItem('inventory') || '[]');
                    const prodData = JSON.parse(localStorage.getItem('products') || '[]');
                    const prodListData = JSON.parse(localStorage.getItem('production') || '[]');
                    const ordersData = JSON.parse(localStorage.getItem('orders') || '[]');
                    const salesData = JSON.parse(localStorage.getItem('sales') || '[]');
                    const expData = JSON.parse(localStorage.getItem('expenses') || '[]');
                    
                    setInventory(invData.length > 0 ? invData : getDefaultInventory());
                    setProducts(prodData.length > 0 ? prodData : getDefaultProducts());
                    setProduction(prodListData);
                    setOrders(ordersData);
                    setSales(salesData);
                    setExpenses(expData);
                } else {
                    const unsubscribers = [];

                    unsubscribers.push(
                        db.collection('inventory').onSnapshot((snapshot) => {
                            const items = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
                            setInventory(items.length > 0 ? items : getDefaultInventory());
                        })
                    );

                    unsubscribers.push(
                        db.collection('products').onSnapshot((snapshot) => {
                            const items = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
                            setProducts(items.length > 0 ? items : getDefaultProducts());
                        })
                    );

                    unsubscribers.push(
                        db.collection('production').orderBy('date', 'desc').onSnapshot((snapshot) => {
                            const items = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
                            setProduction(items);
                        })
                    );

                    unsubscribers.push(
                        db.collection('orders').orderBy('date', 'desc').onSnapshot((snapshot) => {
                            const items = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
                            setOrders(items);
                        })
                    );

                    unsubscribers.push(
                        db.collection('sales').orderBy('date', 'desc').onSnapshot((snapshot) => {
                            const items = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
                            setSales(items);
                        })
                    );

                    unsubscribers.push(
                        db.collection('expenses').orderBy('date', 'desc').onSnapshot((snapshot) => {
                            const items = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
                            setExpenses(items);
                        })
                    );

                    return () => unsubscribers.forEach(unsub => unsub());
                }
            }, [user, userRole]);

            const getDefaultInventory = () => [
                { id: 1, name: 'Цемент', unit: 'кг', quantity: 0, minQuantity: 500, price: 5, notes: '' },
                { id: 2, name: 'Пісок', unit: 'кг', quantity: 0, minQuantity: 1000, price: 1, notes: '' },
                { id: 3, name: 'Щебінь', unit: 'кг', quantity: 0, minQuantity: 1000, price: 1.5, notes: '' }
            ];

            const getDefaultProducts = () => [
                { id: 1, name: 'Шлакоблок', price: 25 },
                { id: 2, name: 'Бетоноблок', price: 30 }
            ];

            const saveToStorage = (key, data) => {
                if (DEMO_MODE) {
                    localStorage.setItem(key, JSON.stringify(data));
                }
            };

            const handleLogout = async () => {
                if (DEMO_MODE) {
                    localStorage.removeItem('currentUser');
                    window.location.reload();
                } else {
                    await auth.signOut();
                }
            };

            const canEdit = () => user && (userRole === 'admin' || userRole === 'manager');
            const canViewFinances = () => user && (userRole === 'admin' || userRole === 'manager');

            // Експорт в Excel
            const exportToExcel = () => {
                const wb = XLSX.utils.book_new();

                // Склад
                const invWs = XLSX.utils.json_to_sheet(inventory.map(i => ({
                    'Назва': i.name,
                    'Кількість': i.quantity,
                    'Одиниця': i.unit,
                    'Ціна': i.price,
                    'Примітки': i.notes || ''
                })));
                XLSX.utils.book_append_sheet(wb, invWs, "Склад");

                // Продукція
                const prodWs = XLSX.utils.json_to_sheet(products.map(p => ({
                    'Назва': p.name,
                    'Ціна': p.price
                })));
                XLSX.utils.book_append_sheet(wb, prodWs, "Продукція");

                // Виробництво
                const productionWs = XLSX.utils.json_to_sheet(production.map(p => ({
                    'Дата': p.date,
                    'Зміна': p.shift,
                    'Продукція': p.productName,
                    'Кількість': p.blocks
                })));
                XLSX.utils.book_append_sheet(wb, productionWs, "Виробництво");

                // Замовлення
                const ordersWs = XLSX.utils.json_to_sheet(orders.map(o => ({
                    'Дата': o.date,
                    'Клієнт': o.customer,
                    'Продукція': o.productName,
                    'Кількість': o.quantity,
                    'Статус': o.status
                })));
                XLSX.utils.book_append_sheet(wb, ordersWs, "Замовлення");

                if (canViewFinances()) {
                    // Продажі
                    const salesWs = XLSX.utils.json_to_sheet(sales.map(s => ({
                        'Дата': s.date,
                        'Покупець': s.customer,
                        'Кількість': s.blocks,
                        'Ціна': s.price,
                        'Сума': s.blocks * s.price,
                        'Оплачено': s.paid ? 'Так' : 'Ні'
                    })));
                    XLSX.utils.book_append_sheet(wb, salesWs, "Продажі");

                    // Витрати
                    const expensesWs = XLSX.utils.json_to_sheet(expenses.map(e => ({
                        'Дата': e.date,
                        'Категорія': e.category,
                        'Опис': e.description,
                        'Сума': e.amount
                    })));
                    XLSX.utils.book_append_sheet(wb, expensesWs, "Витрати");
                }

                const fileName = `backup_${new Date().toISOString().split('T')[0]}.xlsx`;
                XLSX.writeFile(wb, fileName);
            };

            // Бекап всіх даних
            const createBackup = () => {
                const backup = {
                    date: new Date().toISOString(),
                    inventory,
                    products,
                    production,
                    orders,
                    sales,
                    expenses
                };

                const dataStr = JSON.stringify(backup, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `backup_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
            };

            // Статистика
            const calculateStats = () => {
                const productStats = {};
                
                products.forEach(product => {
                    const produced = production
                        .filter(p => p.productName === product.name)
                        .reduce((sum, p) => sum + p.blocks, 0);
                    
                    const sold = sales
                        .filter(s => s.productName === product.name)
                        .reduce((sum, s) => sum + s.blocks, 0);
                    
                    const inOrders = orders
                        .filter(o => o.productName === product.name && o.status !== 'Виконано')
                        .reduce((sum, o) => sum + o.quantity, 0);
                    
                    productStats[product.name] = {
                        produced,
                        sold,
                        inStock: produced - sold,
                        inOrders
                    };
                });

                const totalRevenue = sales.filter(s => s.paid).reduce((sum, s) => sum + (s.blocks * s.price), 0);
                const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
                const profit = totalRevenue - totalExpenses;

                return { productStats, totalRevenue, totalExpenses, profit };
            };

            if (loading) {
                return <div className="flex items-center justify-center h-screen">Завантаження...</div>;
            }

            if (!user) {
                return <LoginScreen />;
            }

            const stats = calculateStats();

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Заголовок */}
                    <div className="bg-blue-600 text-white p-6 shadow-lg">
                        <div className="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-4">
                            <div>
                                <h1 className="text-3xl font-bold">Облік виробництва v2.0</h1>
                                <p className="text-blue-100 mt-2">Розширена система управління</p>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button
                                    onClick={exportToExcel}
                                    className="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg flex items-center space-x-2"
                                >
                                    <Download size={18} />
                                    <span>Excel</span>
                                </button>
                                <button
                                    onClick={createBackup}
                                    className="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg flex items-center space-x-2"
                                >
                                    <Database size={18} />
                                    <span>Бекап</span>
                                </button>
                                <div className="text-right">
                                    <p className="text-sm text-blue-100">{user.email}</p>
                                    <span className="px-2 py-1 bg-blue-700 rounded text-xs">
                                        {userRole === 'admin' ? 'Адмін' : userRole === 'manager' ? 'Менеджер' : 'Працівник'}
                                    </span>
                                </div>
                                <button
                                    onClick={handleLogout}
                                    className="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded-lg flex items-center space-x-2"
                                >
                                    <LogOut size={18} />
                                    <span>Вийти</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    {DEMO_MODE && (
                        <div className="bg-yellow-50 border-b border-yellow-200">
                            <div className="max-w-7xl mx-auto px-6 py-2">
                                <p className="text-yellow-800 text-sm">
                                    🎮 ДЕМО-РЕЖИМ: Дані локально. Налаштуйте Firebase для синхронізації.
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Навігація */}
                    <div className="bg-white shadow-md">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex space-x-8 overflow-x-auto">
                                {[
                                    { id: 'dashboard', label: 'Дашборд', icon: BarChart3 },
                                    { id: 'inventory', label: 'Склад', icon: Package },
                                    { id: 'products', label: 'Продукція', icon: Factory },

                                db={db}
                                saveToStorage={saveToStorage}

                        {activeTab === 'production' && (
                            <ProductionTab
                                production={production}
                                setProduction={setProduction}
                                products={products}
                                user={user}
                                canEdit={canEdit}
                                DEMO_MODE={DEMO_MODE}
                                db={db}
                                saveToStorage={saveToStorage}
                            />
                        )}

                        {activeTab === 'orders' && (
                            <OrdersTab
                                orders={orders}
                                setOrders={setOrders}
                                products={products}
                                user={user}
                                canEdit={canEdit}
                                DEMO_MODE={DEMO_MODE}
                                db={db}
                                saveToStorage={saveToStorage}
                            />

                        {activeTab === 'sales' && canViewFinances() && (
                            <SalesTab

                                setSales={setSales}
                                products={products}
                                user={user}
                                canEdit={canEdit}
                                DEMO_MODE={DEMO_MODE}
                                db={db}
                                saveToStorage={saveToStorage}
                            />

                        {activeTab === 'expenses' && canViewFinances() && (
                            <ExpensesTab
                                expenses={expenses}
                                setExpenses={setExpenses}
                                user={user}
                                canEdit={canEdit}
                                DEMO_MODE={DEMO_MODE}
                                db={db}
                                saveToStorage={saveToStorage}
                            />
                        )}
                    </div>
                </div>
            );
        };

        // Компонент дашборду
        const DashboardTab = ({ stats, products, inventory }) => {
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Загальна статистика</h2>
                    
                    {/* Залишки по продукції */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {products.map(product => {
                            const productStat = stats.productStats[product.name] || { produced: 0, sold: 0, inStock: 0, inOrders: 0 };
                            return (
                                <div key={product.id || product.docId} className="bg-white p-6 rounded-lg shadow">
                                    <h3 className="font-bold text-lg text-gray-900 mb-4">{product.name}</h3>
                                    <div className="space-y-2">
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Вироблено:</span>
                                            <span className="font-bold">{productStat.produced}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Продано:</span>
                                            <span className="font-bold">{productStat.sold}</span>
                                        </div>
                                        <div className="flex justify-between border-t pt-2">
                                            <span className="text-gray-900 font-medium">На складі:</span>
                                            <span className="font-bold text-blue-600 text-xl">{productStat.inStock}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">В замовленнях:</span>
                                            <span className="font-bold text-orange-600">{productStat.inOrders}</span>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Попередження про склад */}
                    <div className="bg-white p-6 rounded-lg shadow">
                        <h3 className="text-lg font-bold mb-4">Попередження про склад</h3>
                        <div className="space-y-2">
                            {inventory.filter(item => item.quantity < item.minQuantity).map(item => (
                                <div key={item.id || item.docId} className="flex items-center space-x-2 p-2 bg-red-50 rounded">
                                    <AlertCircle size={20} className="text-red-600" />
                                    <span className="text-red-800">
                                        {item.name}: {item.quantity} {item.unit} (мін: {item.minQuantity})
                                    </span>
                                </div>
                            ))}
                            {inventory.every(item => item.quantity >= item.minQuantity) && (
                                <p className="text-green-600">✓ Всі матеріали в достатній кількості</p>
                            )}
                        </div>
                    </div>

                    {/* Фінансова статистика */}
                    <div className="bg-white p-6 rounded-lg shadow">

                                <p className="text-gray-600 text-sm">Дохід</p>

                                <p className="text-2xl font-bold text-red-600">{stats.totalExpenses.toFixed(2)} ₴</p>

                            <div>
                                <p className="text-gray-600 text-sm">Прибуток</p>

                    </div>
                </div>
