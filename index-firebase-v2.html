        // Компонент складу
        const InventoryTab = ({ inventory, setInventory, canEdit, canViewFinances, DEMO_MODE, db, saveToStorage }) => {
            const [editingId, setEditingId] = useState(null);
            const [editData, setEditData] = useState({});

            const startEdit = (item) => {
                setEditingId(item.id || item.docId);
                setEditData(item);
            };

            const saveEdit = async () => {
                if (!canEdit()) return;
                
                if (DEMO_MODE) {
                    const updated = inventory.map(i => 
                        (i.id || i.docId) === editingId ? editData : i
                    );
                    setInventory(updated);
                    saveToStorage('inventory', updated);
                } else {
                    const item = inventory.find(i => (i.id || i.docId) === editingId);
                    if (item.docId) {
                        await db.collection('inventory').doc(item.docId).update(editData);
                    }
                }
                setEditingId(null);
            };

            const addItem = async () => {
                if (!canEdit()) return;
                
                const newItem = {
                    id: Date.now(),
                    name: 'Новий матеріал',
                    unit: 'кг',
                    quantity: 0,
                    minQuantity: 100,
                    price: 0,
                    notes: ''
                };
                
                if (DEMO_MODE) {
                    const updated = [...inventory, newItem];
                    setInventory(updated);
                    saveToStorage('inventory', updated);
                } else {
                    await db.collection('inventory').add(newItem);
                }
            };

            const deleteItem = async (item) => {
                if (!canEdit()) return;
                if (!confirm('Видалити цей матеріал?')) return;
                
                if (DEMO_MODE) {
                    const updated = inventory.filter(i => (i.id || i.docId) !== (item.id || item.docId));
                    setInventory(updated);
                    saveToStorage('inventory', updated);
                } else {
                    if (item.docId) {
                        await db.collection('inventory').doc(item.docId).delete();
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold">Склад сировини</h2>
                        {canEdit() && (
                            <button
                                onClick={addItem}
                                className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center space-x-2 hover:bg-blue-700"
                            >
                                <Plus />
                                <span>Додати матеріал</span>
                            </button>
                        )}
                    </div>

                    <div className="bg-white rounded-lg shadow overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Назва</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Кількість</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Одиниця</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Мін.</th>
                                    {canViewFinances() && (
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ціна</th>
                                    )}
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Примітки</th>
                                    {canEdit() && (
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дії</th>
                                    )}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {inventory.map(item => {
                                    const itemId = item.id || item.docId;
                                    const isEditing = editingId === itemId;
                                    
                                    return (
                                        <tr key={itemId}>
                                            <td className="px-6 py-4">
                                                {isEditing ? (
                                                    <input
                                                        type="text"
                                                        value={editData.name}
                                                        onChange={(e) => setEditData({...editData, name: e.target.value})}
                                                        className="border rounded px-2 py-1 w-full"
                                                    />
                                                ) : (
                                                    item.name
                                                )}
                                            </td>
                                            <td className="px-6 py-4">
                                                {isEditing ? (
                                                    <input
                                                        type="number"
                                                        value={editData.quantity}
                                                        onChange={(e) => setEditData({...editData, quantity: parseFloat(e.target.value) || 0})}
                                                        className="border rounded px-2 py-1 w-24"
                                                    />
                                                ) : (
                                                    item.quantity
                                                )}
                                            </td>
                                            <td className="px-6 py-4">
                                                {isEditing ? (
                                                    <input
                                                        type="text"
                                                        value={editData.unit}
                                                        onChange={(e) => setEditData({...editData, unit: e.target.value})}
                                                        className="border rounded px-2 py-1 w-20"
                                                    />
                                                ) : (
                                                    item.unit
                                                )}
                                            </td>
                                            <td className="px-6 py-4">
                                                {isEditing ? (
                                                    <input
                                                        type="number"
                                                        value={editData.minQuantity}
                                                        onChange={(e) => setEditData({...editData, minQuantity: parseFloat(e.target.value) || 0})}
                                                        className="border rounded px-2 py-1 w-24"
                                                    />
                                                ) : (
                                                    item.minQuantity
                                                )}
                                            </td>
                                            {canViewFinances() && (
                                                <td className="px-6 py-4">
                                                    {isEditing ? (
                                                        <input
                                                            type="number"
                                                            step="0.01"
                                                            value={editData.price}
                                                            onChange={(e) => setEditData({...editData, price: parseFloat(e.target.value) || 0})}
                                                            className="border rounded px-2 py-1 w-24"
                                                        />
                                                    ) : (
                                                        `${item.price} ₴`
                                                    )}
                                                </td>
                                            )}
                                            <td className="px-6 py-4">
                                                {isEditing ? (
                                                    <input
                                                        type="text"
                                                        value={editData.notes || ''}
                                                        onChange={(e) => setEditData({...editData, notes: e.target.value})}
                                                        className="border rounded px-2 py-1 w-full"
                                                        placeholder="Примітки"
                                                    />
                                                ) : (
                                                    <span className="text-gray-600 text-sm">{item.notes || '-'}</span>
                                                )}
                                            </td>
                                            {canEdit() && (
                                                <td className="px-6 py-4">
                                                    <div className="flex items-center space-x-2">
                                                        {isEditing ? (
                                                            <>
                                                                <button
                                                                    onClick={saveEdit}
                                                                    className="text-green-600 hover:text-green-800"
                                                                >
                                                                    ✓
                                                                </button>
                                                                <button
                                                                    onClick={() => setEditingId(null)}
                                                                    className="text-red-600 hover:text-red-800"
                                                                >
                                                                    ✕
                                                                </button>
                                                            </>
                                                        ) : (
                                                            <>
                                                                <button
                                                                    onClick={() => startEdit(item)}
                                                                    className="text-blue-600 hover:text-blue-800"
                                                                >
                                                                    <Edit />
                                                                </button>
                                                                <button
                                                                    onClick={() => deleteItem(item)}
                                                                    className="text-red-600 hover:text-red-800"
                                                                >
                                                                    <Trash2 />
                                                                </button>
                                                            </>
                                                        )}
                                                    </div>
                                                </td>
                                            )}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // Компонент продукції
        const ProductsTab = ({ products, setProducts, canEdit, DEMO_MODE, db, saveToStorage }) => {
            const [showAddForm, setShowAddForm] = useState(false);
            const [newProduct, setNewProduct] = useState({ name: '', price: 0 });
            const [editingId, setEditingId] = useState(null);
            const [editData, setEditData] = useState({});

            const addProduct = async (e) => {
                e.preventDefault();
                if (!canEdit()) return;
                
                const product = {
                    id: Date.now(),
                    name: newProduct.name,
                    price: parseFloat(newProduct.price) || 0
                };
                
                if (DEMO_MODE) {
                    const updated = [...products, product];
                    setProducts(updated);
                    saveToStorage('products', updated);
                } else {
                    await db.collection('products').add(product);
                }
                
                setNewProduct({ name: '', price: 0 });
                setShowAddForm(false);
            };

            const startEdit = (product) => {
                setEditingId(product.id || product.docId);
                setEditData({ name: product.name, price: product.price });
            };

            const saveEdit = async () => {
                if (!canEdit()) return;
                
                const updatedPrice = parseFloat(editData.price) || 0;
                
                if (DEMO_MODE) {
                    const updated = products.map(p => 
                        (p.id || p.docId) === editingId 
                            ? { ...p, name: editData.name, price: updatedPrice } 
                            : p
                    );
                    setProducts(updated);
                    saveToStorage('products', updated);
                } else {
                    const product = products.find(p => (p.id || p.docId) === editingId);
                    if (product.docId) {
                        await db.collection('products').doc(product.docId).update({
                            name: editData.name,
                            price: updatedPrice
                        });
                    }
                }
                setEditingId(null);
            };

            const deleteProduct = async (product) => {
                if (!canEdit()) return;
                if (!confirm(`Видалити продукцію "${product.name}"?`)) return;
                
                if (DEMO_MODE) {
                    const updated = products.filter(p => (p.id || p.docId) !== (product.id || product.docId));
                    setProducts(updated);
                    saveToStorage('products', updated);
                } else {
                    if (product.docId) {
                        await db.collection('products').doc(product.docId).delete();
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold">Типи продукції</h2>
                        {canEdit() && (
                            <button
                                onClick={() => setShowAddForm(!showAddForm)}
                                className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center space-x-2 hover:bg-blue-700"
                            >
                                <Plus />
                                <span>Додати продукцію</span>
                            </button>
                        )}
                    </div>

                    {showAddForm && (
                        <div className="bg-white p-6 rounded-lg shadow">
                            <h3 className="text-lg font-bold mb-4">Нова продукція</h3>
                            <form onSubmit={addProduct} className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <input
                                    type="text"
                                    placeholder="Назва продукції"
                                    value={newProduct.name}
                                    onChange={(e) => setNewProduct({...newProduct, name: e.target.value})}
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <input
                                    type="number"
                                    step="0.01"
                                    placeholder="Ціна за одиницю"
                                    value={newProduct.price}
                                    onChange={(e) => setNewProduct({...newProduct, price: e.target.value})}
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                                    Додати
                                </button>
                            </form>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {products.map(product => {
                            const productId = product.id || product.docId;
                            const isEditing = editingId === productId;
                            
                            return (
                                <div key={productId} className="bg-white p-6 rounded-lg shadow">
                                    {isEditing ? (
                                        <div className="space-y-3">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Назва</label>
                                                <input
                                                    type="text"
                                                    value={editData.name}
                                                    onChange={(e) => setEditData({...editData, name: e.target.value})}
                                                    className="w-full border rounded px-3 py-2"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Ціна (₴)</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={editData.price}
                                                    onChange={(e) => setEditData({...editData, price: e.target.value})}
                                                    className="w-full border rounded px-3 py-2"
                                                />
                                            </div>
                                            <div className="flex space-x-2">
                                                <button
                                                    onClick={saveEdit}
                                                    className="flex-1 bg-green-600 text-white px-3 py-2 rounded hover:bg-green-700"
                                                >
                                                    ✓ Зберегти
                                                </button>
                                                <button
                                                    onClick={() => setEditingId(null)}
                                                    className="flex-1 bg-gray-500 text-white px-3 py-2 rounded hover:bg-gray-600"
                                                >
                                                    ✕ Скасувати
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h3 className="font-bold text-lg">{product.name}</h3>
                                                <p className="text-gray-600 mt-1">Ціна: <span className="font-semibold text-blue-600">{product.price} ₴</span></p>
                                            </div>
                                            {canEdit() && (
                                                <div className="flex space-x-2">
                                                    <button
                                                        onClick={() => startEdit(product)}
                                                        className="text-blue-600 hover:text-blue-800"
                                                        title="Редагувати"
                                                    >
                                                        <Edit />
                                                    </button>
                                                    <button
                                                        onClick={() => deleteProduct(product)}
                                                        className="text-red-600 hover:text-red-800"
                                                        title="Видалити"
                                                    >
                                                        <Trash2 />
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // Компонент виробництва
        const ProductionTab = ({ production, setProduction, products, user, canEdit, DEMO_MODE, db, saveToStorage }) => {
            const addProduction = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                
                const productName = formData.get('productName');
                const newItem = {
                    id: Date.now(),
                    date: formData.get('date'),
                    shift: formData.get('shift'),
                    productName: productName,
                    blocks: parseInt(formData.get('blocks')),
                    createdBy: user.email
                };
                
                if (DEMO_MODE) {
                    const updated = [newItem, ...production];
                    setProduction(updated);
                    saveToStorage('production', updated);
                } else {
                    await db.collection('production').add(newItem);
                }
                
                e.target.reset();
            };

            const deleteProduction = async (item) => {
                if (!canEdit()) return;
                if (!confirm('Видалити цей запис?')) return;
                
                if (DEMO_MODE) {
                    const updated = production.filter(p => (p.id || p.docId) !== (item.id || item.docId));
                    setProduction(updated);
                    saveToStorage('production', updated);
                } else {
                    if (item.docId) {
                        await db.collection('production').doc(item.docId).delete();
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Облік виробництва</h2>

                    <div className="bg-white p-6 rounded-lg shadow">
                        <h3 className="text-lg font-bold mb-4">Додати виробництво</h3>
                        <form onSubmit={addProduction} className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <input
                                type="date"
                                name="date"
                                defaultValue={new Date().toISOString().split('T')[0]}
                                required
                                className="border rounded px-3 py-2"
                            />
                            <select name="shift" required className="border rounded px-3 py-2">
                                <option value="Денна">Денна зміна</option>
                                <option value="Нічна">Нічна зміна</option>
                            </select>
                            <select name="productName" required className="border rounded px-3 py-2">
                                <option value="">Виберіть продукцію</option>
                                {products.map(p => (
                                    <option key={p.id || p.docId} value={p.name}>{p.name}</option>
                                ))}
                            </select>
                            <input
                                type="number"
                                name="blocks"
                                placeholder="Кількість"
                                required
                                className="border rounded px-3 py-2"
                            />
                            <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 md:col-span-4">
                                Додати
                            </button>
                        </form>
                    </div>

                    <div className="bg-white rounded-lg shadow overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дата</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Зміна</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Продукція</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Кількість</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Додав</th>
                                    {canEdit() && (
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дії</th>
                                    )}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {production.map(p => (
                                    <tr key={p.id || p.docId}>
                                        <td className="px-6 py-4">{p.date}</td>
                                        <td className="px-6 py-4">{p.shift}</td>
                                        <td className="px-6 py-4">
                                            <span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-sm">
                                                {p.productName}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 font-bold">{p.blocks}</td>
                                        <td className="px-6 py-4 text-sm text-gray-600">{p.createdBy}</td>
                                        {canEdit() && (
                                            <td className="px-6 py-4">
                                                <button
                                                    onClick={() => deleteProduction(p)}
                                                    className="text-red-600 hover:text-red-800"
                                                >
                                                    <Trash2 />
                                                </button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // Компонент замовлень
        const OrdersTab = ({ orders, setOrders, products, user, canEdit, DEMO_MODE, db, saveToStorage }) => {
            const addOrder = async (e) => {
                e.preventDefault();
                if (!canEdit()) return;
                
                const formData = new FormData(e.target);
                const newItem = {
                    id: Date.now(),
                    date: formData.get('date'),
                    customer: formData.get('customer'),
                    productName: formData.get('productName'),
                    quantity: parseInt(formData.get('quantity')),
                    status: 'Нове',
                    notes: formData.get('notes') || '',
                    createdBy: user.email
                };
                
                if (DEMO_MODE) {
                    const updated = [newItem, ...orders];
                    setOrders(updated);
                    saveToStorage('orders', updated);
                } else {
                    await db.collection('orders').add(newItem);
                }
                
                e.target.reset();
            };

            const updateStatus = async (order, newStatus) => {
                if (!canEdit()) return;
                
                if (DEMO_MODE) {
                    const updated = orders.map(o => 
                        (o.id || o.docId) === (order.id || order.docId) ? { ...o, status: newStatus } : o
                    );
                    setOrders(updated);
                    saveToStorage('orders', updated);
                } else {
                    if (order.docId) {
                        await db.collection('orders').doc(order.docId).update({ status: newStatus });
                    }
                }
            };

            const deleteOrder = async (order) => {
                if (!canEdit()) return;
                if (!confirm('Видалити це замовлення?')) return;
                
                if (DEMO_MODE) {
                    const updated = orders.filter(o => (o.id || o.docId) !== (order.id || order.docId));
                    setOrders(updated);
                    saveToStorage('orders', updated);
                } else {
                    if (order.docId) {
                        await db.collection('orders').doc(order.docId).delete();
                    }
                }
            };

            const statusColors = {
                'Нове': 'bg-blue-100 text-blue-800',
                'В роботі': 'bg-yellow-100 text-yellow-800',
                'Готово': 'bg-green-100 text-green-800',
                'Виконано': 'bg-gray-100 text-gray-800'
            };

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Замовлення</h2>

                    {canEdit() && (
                        <div className="bg-white p-6 rounded-lg shadow">
                            <h3 className="text-lg font-bold mb-4">Нове замовлення</h3>
                            <form onSubmit={addOrder} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input
                                    type="date"
                                    name="date"
                                    defaultValue={new Date().toISOString().split('T')[0]}
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <input
                                    type="text"
                                    name="customer"
                                    placeholder="Клієнт"
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <select name="productName" required className="border rounded px-3 py-2">
                                    <option value="">Виберіть продукцію</option>
                                    {products.map(p => (
                                        <option key={p.id || p.docId} value={p.name}>{p.name}</option>
                                    ))}
                                </select>
                                <input
                                    type="number"
                                    name="quantity"
                                    placeholder="Кількість"
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <input
                                    type="text"
                                    name="notes"
                                    placeholder="Примітки (необов'язково)"
                                    className="border rounded px-3 py-2 md:col-span-2"
                                />
                                <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 md:col-span-2">
                                    Додати замовлення
                                </button>
                            </form>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дата</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Клієнт</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Продукція</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Кількість</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Статус</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Примітки</th>
                                    {canEdit() && (
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дії</th>
                                    )}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {orders.map(order => (
                                    <tr key={order.id || order.docId}>
                                        <td className="px-6 py-4">{order.date}</td>
                                        <td className="px-6 py-4 font-medium">{order.customer}</td>
                                        <td className="px-6 py-4">{order.productName}</td>
                                        <td className="px-6 py-4 font-bold">{order.quantity}</td>
                                        <td className="px-6 py-4">
                                            {canEdit() ? (
                                                <select
                                                    value={order.status}
                                                    onChange={(e) => updateStatus(order, e.target.value)}
                                                    className={`px-2 py-1 rounded text-sm ${statusColors[order.status]}`}
                                                >
                                                    <option value="Нове">Нове</option>
                                                    <option value="В роботі">В роботі</option>
                                                    <option value="Готово">Готово</option>
                                                    <option value="Виконано">Виконано</option>
                                                </select>
                                            ) : (
                                                <span className={`px-2 py-1 rounded text-sm ${statusColors[order.status]}`}>
                                                    {order.status}
                                                </span>
                                            )}
                                        </td>
                                        <td className="px-6 py-4 text-sm text-gray-600">{order.notes || '-'}</td>
                                        {canEdit() && (
                                            <td className="px-6 py-4">
                                                <button
                                                    onClick={() => deleteOrder(order)}
                                                    className="text-red-600 hover:text-red-800"
                                                >
                                                    <Trash2 />
                                                </button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // Компонент продажів
        const SalesTab = ({ sales, setSales, products, user, canEdit, DEMO_MODE, db, saveToStorage }) => {
            const addSale = async (e) => {
                e.preventDefault();
                if (!canEdit()) return;
                
                const formData = new FormData(e.target);
                const newItem = {
                    id: Date.now(),
                    date: formData.get('date'),
                    customer: formData.get('customer'),
                    productName: formData.get('productName'),
                    blocks: parseInt(formData.get('blocks')),
                    pallets: parseInt(formData.get('pallets')) || 0,
                    price: parseFloat(formData.get('price')),
                    paid: formData.get('paid') === 'true',
                    createdBy: user.email
                };
                
                if (DEMO_MODE) {
                    const updated = [newItem, ...sales];
                    setSales(updated);
                    saveToStorage('sales', updated);
                } else {
                    await db.collection('sales').add(newItem);
                }
                
                e.target.reset();
            };

            const togglePaid = async (sale) => {
                if (!canEdit()) return;
                
                if (DEMO_MODE) {
                    const updated = sales.map(s => 
                        (s.id || s.docId) === (sale.id || sale.docId) ? { ...s, paid: !s.paid } : s
                    );
                    setSales(updated);
                    saveToStorage('sales', updated);
                } else {
                    if (sale.docId) {
                        await db.collection('sales').doc(sale.docId).update({ paid: !sale.paid });
                    }
                }
            };

            const deleteSale = async (sale) => {
                if (!canEdit()) return;
                if (!confirm('Видалити цей продаж?')) return;
                
                if (DEMO_MODE) {
                    const updated = sales.filter(s => (s.id || s.docId) !== (sale.id || sale.docId));
                    setSales(updated);
                    saveToStorage('sales', updated);
                } else {
                    if (sale.docId) {
                        await db.collection('sales').doc(sale.docId).delete();
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Продажі</h2>

                    {canEdit() && (
                        <div className="bg-white p-6 rounded-lg shadow">
                            <h3 className="text-lg font-bold mb-4">Новий продаж</h3>
                            <form onSubmit={addSale} className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <input
                                    type="date"
                                    name="date"
                                    defaultValue={new Date().toISOString().split('T')[0]}
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <input
                                    type="text"
                                    name="customer"
                                    placeholder="Покупець"
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <select name="productName" required className="border rounded px-3 py-2">
                                    <option value="">Виберіть продукцію</option>
                                    {products.map(p => (
                                        <option key={p.id || p.docId} value={p.name}>{p.name}</option>
                                    ))}
                                </select>
                                <input
                                    type="number"
                                    name="blocks"
                                    placeholder="Кількість"
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <input
                                    type="number"
                                    name="pallets"
                                    placeholder="Піддонів"
                                    className="border rounded px-3 py-2"
                                />
                                <input
                                    type="number"
                                    step="0.01"
                                    name="price"
                                    placeholder="Ціна за шт"
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <select name="paid" required className="border rounded px-3 py-2">
                                    <option value="false">Не оплачено</option>
                                    <option value="true">Оплачено</option>
                                </select>
                                <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 md:col-span-3">
                                    Додати продаж
                                </button>
                            </form>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дата</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Покупець</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Продукція</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Кількість</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Піддонів</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ціна</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Сума</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Статус</th>
                                    {canEdit() && (
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дії</th>
                                    )}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {sales.map(sale => (
                                    <tr key={sale.id || sale.docId}>
                                        <td className="px-6 py-4">{sale.date}</td>
                                        <td className="px-6 py-4">{sale.customer}</td>
                                        <td className="px-6 py-4">{sale.productName}</td>
                                        <td className="px-6 py-4">{sale.blocks}</td>
                                        <td className="px-6 py-4 text-blue-600">{sale.pallets || 0}</td>
                                        <td className="px-6 py-4">{sale.price.toFixed(2)} ₴</td>
                                        <td className="px-6 py-4 font-bold">{(sale.blocks * sale.price).toFixed(2)} ₴</td>
                                        <td className="px-6 py-4">
                                            <button
                                                onClick={() => canEdit() && togglePaid(sale)}
                                                disabled={!canEdit()}
                                                className={`px-2 py-1 rounded text-sm ${
                                                    sale.paid ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
                                                } ${canEdit() ? 'cursor-pointer hover:opacity-80' : 'cursor-default'}`}
                                            >
                                                {sale.paid ? 'Оплачено' : 'Не оплачено'}
                                            </button>
                                        </td>
                                        {canEdit() && (
                                            <td className="px-6 py-4">
                                                <button
                                                    onClick={() => deleteSale(sale)}
                                                    className="text-red-600 hover:text-red-800"
                                                >
                                                    <Trash2 />
                                                </button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // Компонент витрат
        const ExpensesTab = ({ expenses, setExpenses, user, canEdit, DEMO_MODE, db, saveToStorage }) => {
            const addExpense = async (e) => {
                e.preventDefault();
                if (!canEdit()) return;
                
                const formData = new FormData(e.target);
                const newItem = {
                    id: Date.now(),
                    date: formData.get('date'),
                    category: formData.get('category'),
                    description: formData.get('description'),
                    amount: parseFloat(formData.get('amount')),
                    createdBy: user.email
                };
                
                if (DEMO_MODE) {
                    const updated = [newItem, ...expenses];
                    setExpenses(updated);
                    saveToStorage('expenses', updated);
                } else {
                    await db.collection('expenses').add(newItem);
                }
                
                e.target.reset();
            };

            const deleteExpense = async (expense) => {
                if (!canEdit()) return;
                if (!confirm('Видалити цю витрату?')) return;
                
                if (DEMO_MODE) {
                    const updated = expenses.filter(e => (e.id || e.docId) !== (expense.id || expense.docId));
                    setExpenses(updated);
                    saveToStorage('expenses', updated);
                } else {
                    if (expense.docId) {
                        await db.collection('expenses').doc(expense.docId).delete();
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold">Витрати</h2>

                    {canEdit() && (
                        <div className="bg-white p-6 rounded-lg shadow">
                            <h3 className="text-lg font-bold mb-4">Нова витрата</h3>
                            <form onSubmit={addExpense} className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input
                                    type="date"
                                    name="date"
                                    defaultValue={new Date().toISOString().split('T')[0]}
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <select name="category" required className="border rounded px-3 py-2">
                                    <option value="Сировина">Сировина</option>
                                    <option value="Зарплата">Зарплата</option>
                                    <option value="Електроенергія">Електроенергія</option>
                                    <option value="Обладнання">Обладнання</option>
                                    <option value="Транспорт">Транспорт</option>
                                    <option value="Оренда">Оренда</option>
                                    <option value="Інше">Інше</option>
                                </select>
                                <input
                                    type="text"
                                    name="description"
                                    placeholder="Опис"
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <input
                                    type="number"
                                    step="0.01"
                                    name="amount"
                                    placeholder="Сума"
                                    required
                                    className="border rounded px-3 py-2"
                                />
                                <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 md:col-span-4">
                                    Додати витрату
                                </button>
                            </form>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дата</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Категорія</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Опис</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Сума</th>
                                    {canEdit() && (
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дії</th>
                                    )}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {expenses.map(expense => (
                                    <tr key={expense.id || expense.docId}>
                                        <td className="px-6 py-4">{expense.date}</td>
                                        <td className="px-6 py-4">
                                            <span className="px-2 py-1 bg-purple-100 text-purple-800 rounded text-sm">
                                                {expense.category}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4">{expense.description}</td>
                                        <td className="px-6 py-4 font-bold text-red-600">{expense.amount.toFixed(2)} ₴</td>
                                        {canEdit() && (
                                            <td className="px-6 py-4">
                                                <button
                                                    onClick={() => deleteExpense(expense)}
                                                    className="text-red-600 hover:text-red-800"
                                                >
                                                    <Trash2 />
                                                </button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<ProductionApp />, document.getElementById('root'));
    </script>
</body>
</html>
